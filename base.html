                <button onclick="window.location.href='/update-profile'">Update Profile</button>
                <button onclick="showChangeLogoModal()">Change Logo</button>
                <button onclick="showLogoutConfirmation()">Logout</button>
            </div>
        </div>
    
        <div class="container">
            <h1>PASTE YOUR RESPONSE HERE</h1>
        
            <form id="questionForm" action="/submit" method="post" onsubmit="return validateForm()">
                <label for="question"></label><br>
                <div style="position: relative;">
                    <textarea id="question" name="question" rows="5" cols="30" required></textarea>
                    <label for="fileUpload" class="attach-button" title="Attach file">
                        <span>📎</span>
                        <input type="file" id="fileUpload" name="file" style="display: none;" 
                               accept=".pdf,.txt,.doc,.docx" onchange="handleFileSelection()">
                    </label>
                </div>
                <span class="error-message" id="error-message">Please enter a valid question.</span><br>
 
                <div id="filePreview" style="margin-top: 10px; display: none;">
                    <div style="display: flex; align-items: center; gap: 10px; background: #f5f5f5; padding: 8px; border-radius: 5px;">
                        <span id="fileNameDisplay" style="font-weight: bold; color: #4CAF50;"></span>
                        <button type="button" onclick="removeFile()" style="background: none; border: none; color: #f44336; cursor: pointer;" title="Remove file">
                            ✕
                        </button>
                    </div>
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button type="submit">Submit Text</button>
                    <button type="button" onclick="submitFile()" id="fileSubmitBtn" disabled>Submit File</button>
                </div>
            </form>

            <div id="fileAnswer" style="margin-top: 20px;"></div>
        </div>
        <div id="similarFilesResults" style="margin-top: 20px; display: none;">
            <h3>Similar Files:</h3>
            <div id="similarFilesList"></div>
        </div>
    
        <div id="logoutModal" class="modal">
            <div class="modal-content">
                <p>Are you sure you want to logout?</p>
                <button onclick="logout()">Yes</button>
                <button class="cancel" onclick="closeModal()">No</button>
            </div>
        </div>

        <div id="changeLogoModal" class="modal">
            <div class="modal-content">
                <p>Upload and crop your profile picture:</p>
                <input type="file" id="logoUpload" accept="image/*">
                <div id="imagePreview" style="margin: 20px 0; display: none;">
                    <img id="cropperImage" src="#" alt="Preview" style="max-width: 100%;">
                </div>
                <button onclick="uploadLogo()">Upload</button>
                <button class="cancel" onclick="closeChangeLogoModal()">Cancel</button>
            </div>
        </div>

        <div id="newChatModal" class="modal">
            <div class="modal-content">
                <p>Enter a name for your new chat:</p>
                <input type="text" id="chatNameInput" placeholder="Chat Name">
                <button onclick="createNewChat()">Create</button>
                <button class="cancel" onclick="closeNewChatModal()">Cancel</button>
            </div>
        </div>

        <div id="updateChatModal" class="modal">
            <div class="modal-content">
                <p>Enter a new name for the chat:</p>
                <input type="text" id="newChatNameInput" placeholder="New Chat Name">
                <button onclick="updateChatName()">Update</button>
                <button class="cancel" onclick="closeUpdateChatModal()">Cancel</button>
            </div>
        </div>

        <div id="confirmationModal" class="confirmation-modal">
            <p>Do you really want to delete this chat?</p>
            <button class="confirm" onclick="confirmDelete()">Yes</button>
            <button class="cancel" onclick="closeConfirmationModal()">No</button>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
        <script src="JS/base.js"></script>
    </body>
</html>
