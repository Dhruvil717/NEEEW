<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="CSS/onlylogin.css">
</head>
<body>
    <div class="container">
        <h1>Welcome to ZEstimator App</h1>
        <form id="loginForm" action="/onlylogin" method="POST" onsubmit="return validateLoginForm()">
            <h2>Login</h2>
            <input type="email" name="email" id="email" placeholder="Email" required><br>
            <input type="password" name="password" id="password" placeholder="Password" required><br>
            <div id="error-message" class="error"></div>
            <button type="submit">Login</button>
        </form>
    </div>

    <script src="JS/onlylogin.js"></script>
</body>
</html>
