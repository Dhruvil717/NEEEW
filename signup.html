<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="CSS/signup.css">
</head>
<body>
    <div class="container">
        <h1>Create Your Account</h1>
        <form id="signupForm" action="/signup" method="POST" onsubmit="return validateSignupForm()">
            <h2>Sign Up</h2>
            <input type="text" name="first_name" placeholder="First Name" required><br>
            <input type="text" name="last_name" placeholder="Last Name" required><br>
            <input type="date" name="dob" required><br>
            <div class="dropdown-container">
                <input type="text" id="countrySearch" placeholder="Select Country" readonly>
                <div id="countryDropdown" class="dropdown">
                    <input type="text" id="searchInput" placeholder="Search country...">
                    <div id="dropdownOptions"></div>
                </div>
                <input type="hidden" name="country" id="country">
            </div>
            <div class="phone-container">
                <input type="text" name="countryCode" id="countryCode" placeholder="+Code" required>
                <input type="text" name="phone_number" placeholder="Phone Number" maxlength="10" required>
            </div>

            <select name="gender" required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select><br>
            <input type="email" name="email" placeholder="Email" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <div id="error-message" class="error"></div>
            <button type="submit">Create Account</button>
        </form>

        <p>Already have an account? <a href="/onlylogin">Login here</a></p>
    </div>

    <script src="JS/signup.js"></script>
</body>
</html>
