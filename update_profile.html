<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 400px;
            text-align: center;
        }
        h1 {
            color: #4CAF50;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }
        .dropdown-container {
            position: relative;
        }
        .dropdown {
            position: absolute;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            background: white;
            border: 1px solid #ddd;
            display: none;
            z-index: 1000;
        }
        .dropdown input {
            width: 95%;
            margin: 5px;
            padding: 8px;
            border: 1px solid #ddd;
        }
        .dropdown div {
            padding: 10px;
            cursor: pointer;
        }
        .dropdown div:hover {
            background-color: #f1f1f1;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        .password-section {
            margin-top: 20px;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Update Profile</h1>
        <form id="updateProfileForm" action="/update-profile" method="post">
            <input type="text" name="first_name" placeholder="Updated First Name" value="{{ user.first_name }}" required><br>
            <input type="text" name="last_name" placeholder="Updated Last Name" value="{{ user.last_name }}" required><br>
            <div class="dropdown-container">
                <input type="text" id="countrySearch" placeholder="Select Country" value="{{ user.country }}" readonly>
                <div id="countryDropdown" class="dropdown">
                    <input type="text" id="searchInput" placeholder="Search country...">
                    <div id="dropdownOptions"></div>
                </div>
                <input type="hidden" name="country" id="country">
            </div>
            <input type="text" name="postal_code" id="postalCode" placeholder="Postal Code" value="{{ user.postal_code }}" readonly><br>

            <input type="text" name="phone_number" placeholder="Updated Phone Number" value="{{ user.phone_number }}" required><br>
            <button type="submit">Save Changes</button>
        </form>
        <div class="password-section">
            <h2>Change Password</h2>
            <form id="changePasswordForm" action="/update-password" method="post">
                <input type="date" name="dob_verify" id="dob_verify" placeholder="Enter your DOB for verification" required><br>
                <button type="button" id="verifyDobButton">Verify DOB</button>
                <div id="passwordFields" class="hidden">
                    <input type="password" name="new_password" placeholder="New Password" required><br>
                    <input type="password" name="confirm_password" placeholder="Confirm New Password" required><br>
                    <button type="submit">Change Password</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let countryList = [];

        async function fetchCountries() {
            try {
                const response = await fetch("https://restcountries.com/v3.1/all");
                const data = await response.json();

                countryList = data.map(country => ({
                    name: country.name.common,
                    code: country.idd.root + (country.idd.suffixes ? country.idd.suffixes[0] : "")
                })).sort((a, b) => a.name.localeCompare(b.name));

                updateDropdown(countryList.slice(0, 5));
            } catch (error) {
                console.error("Error fetching countries:", error);
            }
        }

        function updateDropdown(countries) {
            const dropdownOptions = document.getElementById("dropdownOptions");
            dropdownOptions.innerHTML = "";

            countries.forEach(country => {
                const option = document.createElement("div");
                option.textContent = country.name;
                option.dataset.code = country.code;
                option.onclick = () => selectCountry(country.name, country.code);
                dropdownOptions.appendChild(option);
            });
        }

        function selectCountry(name, code) {
            document.getElementById("countrySearch").value = name;
            document.getElementById("country").value = name;
            document.getElementById("countryDropdown").style.display = "none";
        }

        document.getElementById("countrySearch").addEventListener("focus", function () {
            document.getElementById("countryDropdown").style.display = "block";
            updateDropdown(countryList.slice(0, 5));
        });

        document.getElementById("searchInput").addEventListener("input", function () {
            const searchTerm = this.value.toLowerCase();
            const filteredCountries = countryList.filter(country => country.name.toLowerCase().includes(searchTerm));
            updateDropdown(filteredCountries.slice(0, 10));
        });

        document.addEventListener("click", function (event) {
            if (!event.target.closest(".dropdown-container")) {
                document.getElementById("countryDropdown").style.display = "none";
            }
        });
        document.getElementById("verifyDobButton").addEventListener("click", async function () {
            const dob = document.getElementById("dob_verify").value;
            if (!dob) {
                alert("Please enter your DOB.");
                return;
            }

            const response = await fetch("/verify-dob", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({ dob_verify: dob }),
            });

            const result = await response.json();
            if (result.success) {
                document.getElementById("passwordFields").classList.remove("hidden");
            } else {
                alert("Invalid DOB. Please try again.");
            }
        });

        window.onload = fetchCountries;
    </script>
</body>
</html>
